<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>
        Movie Tracker
    </title>
    
</head>

<body>

    <header>
    <nav>

        <div id="Titre">
            <img src="assets/nav.png" >
            <a href="index.html">Movie Tracker</a>
        </div>

        <div> 
            <a class = "navigation" href="index.html#Ajouter">Ajouter</a> &nbsp; 
            <a class = "navigation" href="index.html#Selection">Sélection </a> &nbsp; 
            <a class = "navigation" href="index.html#Stat">Stats </a> &nbsp; 
            <a class = "navigation" href="index.html#Liste">Liste </a> &nbsp; 
        </div>

        
    </nav>
    </header>

    <main>
        <section id="Ajouter">
            <h1>Ajouter un film ou une série</h1>
                <p>Remplissez le formulaire pour ajouter un film à votre collection.</p>

                <form id="formulaireAjout">
                    <label for="titre">Titre</label>
                    <input type="text" id="titre" placeholder="Ex. Inception" required>

                    <label for="genre">Genre</label>
                    <select id="genre" required>
                        <option value="" disabled selected>Choisir un genre</option>
                        <option value="Action">Action</option>
                        <option value="Romance">Romance</option>
                        <option value="Science-fiction">Science-fiction</option>
                        <option value="Fantaisie">Fantaisie</option>
                        <option value="Comédie">Comédie</option>
                        <option value="Drame">Drame</option>
                        <option value="Animation">Animation</option>
                        <option value="Documentaire">Documentaire</option>
                        <option value="Série">Série</option>
                    </select>

                    <label for="statut">Statut</label>
                    <select id="statut" required>
                        <option value="" disabled selected>Choisir un statut</option>
                        <option value="À voir">À voir</option>
                        <option value="En cours">En cours</option>
                        <option value="Vu">Vu</option>
                    </select>
                    
                    <button type="submit" id="btnAjouter">+ Ajouter</button>
                </form>
        </section>


        <section id="Selection">
            <h1>Sélection cinéma</h1>
        </section>

        <section id="Stat">
            <h1>Statistiques</h1>
        </section>

        <section id="Liste">
            <h1>Mes Films et Séries</h1>
        </section>


        <section id="media">
            <h1>Bande-annonce de votre film préféré</h1>
        </section>
    
    </main>

    <footer>
    <div id="contenu-footer">
        <p>&copy; 2026 IFT1005;</p>
        <div>
            <a href="mailto:contact@email.com">Contact</a> &nbsp;
            <a href="">Privacy</a>
        </div>
    </div>
</footer>
</body>
</html>
